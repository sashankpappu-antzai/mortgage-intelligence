# Render blueprint — deploy mortgage-intelligence as a hosted trial.
#
# Object storage: Cloudflare R2 (S3-compatible, free egress).  Set the R2
# values once as environment-group secrets — they are *not* generated by Render.
#
# Prerequisites:
#   1. Cloudflare R2 bucket created + S3 API access key/secret.
#   2. A Render environment group named "mortgage-intelligence-secrets" containing:
#        STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY, STORAGE_BUCKET,
#        STORAGE_ENDPOINT_URL, STORAGE_REGION,        # R2 values
#        ANTHROPIC_API_KEY,                           # optional cloud LLM
#        LANGFUSE_SECRET_KEY, LANGFUSE_PUBLIC_KEY,    # optional observability
#        LANGFUSE_HOST                                # if self-hosted Langfuse elsewhere
#
# After the first deploy, copy the rendered backend URL into the
# `NEXT_PUBLIC_API_URL` field on the frontend service and trigger a redeploy.

databases:
  - name: mortgage-intelligence-db
    databaseName: mortgage_intelligence
    user: mortgage_intelligence
    plan: basic-256mb       # ~$6/mo — smallest non-free Render Postgres tier (persists indefinitely)
    region: oregon
    postgresMajorVersion: "16"

services:
  # ---------------- Backend (FastAPI) ----------------
  - type: web
    name: mortgage-intelligence-backend
    runtime: docker
    plan: starter           # $7/mo — free tier sleeps after 15 min idle
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO

      # PostgreSQL — Render injects postgres://; config.py normalizes to postgresql+asyncpg://
      - key: POSTGRES_URL
        fromDatabase:
          name: mortgage-intelligence-db
          property: connectionString

      # JWT secret — rotated by Render on first create
      - key: JWT_SECRET_KEY
        generateValue: true

      # CORS allow-list.  Set to the public frontend URL after the first deploy.
      # Multiple origins: comma-separated, no spaces, no wildcard.
      - key: ALLOWED_ORIGINS
        sync: false          # supplied via dashboard once frontend URL is known

      # Trial-mode flag — frontend renders a synthetic-data-only banner
      - key: TRIAL_MODE
        value: "true"

      # SQL query echo (debug only)
      - key: SQL_ECHO
        value: "false"

      # Object storage (R2) — pulled from the secrets env group below
      - fromGroup: mortgage-intelligence-secrets

      # LLM provider — default to Anthropic if key is present, else fall back to
      # Ollama (not reachable from Render, so a self-hosted Ollama URL is needed).
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_DEFAULT_MODEL
        value: claude-sonnet-4-6

  # ---------------- Frontend (Next.js) ----------------
  - type: web
    name: mortgage-intelligence-frontend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to the backend's public Render URL after the first deploy.
      - key: NEXT_PUBLIC_API_URL
        sync: false

# Environment group reference — declared above by `fromGroup`.
# Create this group manually in the Render dashboard (one-time, never in git):
#   Environment Groups → New → Name: mortgage-intelligence-secrets
#   Keys: STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY, STORAGE_BUCKET,
#         STORAGE_ENDPOINT_URL, STORAGE_REGION, ANTHROPIC_API_KEY,
#         LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
envVarGroups:
  - name: mortgage-intelligence-secrets
